__include__: [
  '../dataset/visdrone_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetr_r50vd.yml',
]

output_dir: ./output/rtdetr_csfh_l_6x_visdrone

RTDETR:
  backbone: CSFHNet

CSFHNet:
  channels_list: [128, 256, 384, 384]
  csfh_n: [1, 1, 1, 3]
  expansion: 0.5
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  act: silu

HybridEncoder:
  in_channels: [256, 384, 384]
  hidden_dim: 256
  expansion: 0.5

RTDETRTransformer:
  eval_idx: -1
  num_decoder_layers: 3
  num_denoising: 100

epoches: 300
clip_max_norm: 0.1

train_dataloader:
  batch_size: 4
  num_workers: 4

val_dataloader:
  batch_size: 4
  num_workers: 4

lr_scheduler:
  type: MultiStepLR
  milestones: [999]
  gamma: 0.1

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?=.*norm).*$'
      lr: 0.00001
      weight_decay: 0.
    -
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.00001
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bias)).*$'
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001